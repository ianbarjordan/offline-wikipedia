<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albert Einstein</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      max-width: 860px;
      margin: 40px auto;
      padding: 0 24px 60px;
      line-height: 1.8;
      color: #1a1a1a;
      background: #f8f8f6;
    }
    h1 {
      font-size: 1.9rem;
      font-weight: bold;
      border-bottom: 2px solid #3366cc;
      padding-bottom: 0.35em;
      margin-bottom: 0.6em;
      color: #222;
    }
    .lead {
      font-size: 1.08rem;
      color: #222;
      background: #eef2fb;
      border-left: 4px solid #3366cc;
      padding: 14px 18px;
      margin-bottom: 1.8em;
      border-radius: 0 6px 6px 0;
    }
    .body-text {
      font-size: 0.97rem;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: #333;
    }
    .footer {
      margin-top: 2.5em;
      font-size: 0.82rem;
      color: #777;
      border-top: 1px solid #ddd;
      padding-top: 0.8em;
    }
    .footer a { color: #3366cc; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Albert Einstein</h1>
  <div class="lead">Albert Einstein was a German-born theoretical physicist.</div>
  <div class="body-text">Albert Einstein was a German-born theoretical physicist. He developed the theory of relativity.</div>
  <div class="footer">
    Source:&nbsp;<a href="https://simple.wikipedia.org/wiki/Albert_Einstein">
    simple.wikipedia.org/wiki/Albert_Einstein</a>
  </div>
</body>
</html>
